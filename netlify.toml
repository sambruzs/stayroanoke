[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Proxy /api/* to Netlify function in production
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/guesty/:splat"
  status = 200

# SPA fallback - must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
